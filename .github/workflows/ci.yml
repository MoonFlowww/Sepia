name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc-13
            cxx: g++-13
          - os: ubuntu-latest
            cc: clang-16
            cxx: clang++-16
          - os: macos-latest
            cc: clang
            cxx: clang++
          - os: windows-latest
            cc: cl
            cxx: cl

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Catch2 amalgamated sources
        shell: bash
        run: |
          curl -fsSL https://github.com/catchorg/Catch2/releases/download/v3.7.1/catch_amalgamated.hpp -o tests/catch_amalgamated.hpp
          curl -fsSL https://github.com/catchorg/Catch2/releases/download/v3.7.1/catch_amalgamated.cpp -o tests/catch_amalgamated.cpp

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          CXXFLAGS: -Wall -Wextra
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Release -j 4

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C Release
